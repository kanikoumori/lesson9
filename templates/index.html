<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魚の名前あてクイズ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <video src="{{ url_for('static', filename='videos/background.mp4') }}" autoplay muted loop playsinline class="video"></video>

    <div class="container">
        <h1>魚の名前を答えろ！</h1>
        
        {% if not finished %}
            <p>第 {{ step }} 問 / 全 5 問</p>

            {% if last_result %}
                <div class="result {{ last_result.status }}" style="margin-bottom: 20px; padding: 10px; border-radius: 5px;">
                    {{ last_result.msg }}
                </div>
            {% endif %}

            <div class="quiz-area">
                <img src="{{ url_for('static', filename='images/' + fish.id|string + '.jpg') }}" class="fish-image">
                <form method="POST">
                    <input type="text" name="answer" placeholder="名前をカタカナで入力" autofocus required autocomplete="off" style="padding: 10px; width: 70%;">
                    <button type="submit" style="padding: 10px 20px; background: #e94560; color: white; border: none; cursor: pointer;">回答</button>
                </form>
            </div>
        {% else %}
            <div class="finish-area">
                <h2>全問終了！</h2>
                <p>正解数: {{ score }} / 5</p>
                <a href="{{ url_for('index') }}" style="color: #4ecca3;">最初から遊ぶ</a>
            </div>
        {% endif %}
    </div>
</body>
<video src="{{ url_for('static', filename='videos/background.mp4') }}" autoplay muted loop playsinline class="video"></video>
</html>
