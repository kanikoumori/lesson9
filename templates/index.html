<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魚の名前あてクイズ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <video src="{{ url_for('static', filename='videos/background.mp4') }}" autoplay muted loop playsinline class="video"></video>

    <div class="container">
        <h1>魚の名前を答えろ！</h1>
        
        {% if not finished %}
            <p>第 {{ step }} 問 / 全 5 問</p>

            {% if last_result %}
                <div class="result {{ last_result.status }}">
                    {{ last_result.msg }}
                </div>
            {% endif %}

            <div class="quiz-area">
                <img src="{{ url_for('static', filename='images/' + fish.id|string + '.jpg') }}" class="fish-image">
                <form method="POST">
                    <input type="text" name="answer" placeholder="名前をカタカナで入力" autofocus required autocomplete="off">
                    <br>
                    <button type="submit" class="btn-submit">回答する</button>
                </form>
            </div>
        {% else %}
            <div class="finish-area">
                <h2>全問終了！</h2>
                <p>あなたの正解数: <strong>{{ score }} / 5</strong></p>
                <a href="{{ url_for('index') }}" class="btn-reset">もう一度挑戦する</a>
            </div>
        {% endif %}
    </div>
</body>
</html>
