<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魚の名前あてクイズ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <video src="{{ url_for('static', filename='videos/background.mp4') }}" autoplay muted loop playsinline class="video"></video>

    <div class="container">
        <h1>魚の名前を答えろ！</h1>

        {% if select_level %}
            <div class="level-select">
                <p>難易度を選んでください</p>
                <a href="{{ url_for('start_game', level='easy') }}" class="btn-level">初級 (3問)</a><br>
                <a href="{{ url_for('start_game', level='normal') }}" class="btn-level">中級 (5問)</a><br>
                <a href="{{ url_for('start_game', level='hard') }}" class="btn-level">上級 (10問)</a>
            </div>
        {% elif not finished %}
            <p>第 {{ step }} 問 / 全 {{ total }} 問</p>
            {% if last_result %}
                <div class="result {{ last_result.status }}">{{ last_result.msg }}</div>
            {% endif %}
            <div class="quiz-area">
                <img src="{{ url_for('static', filename='images/' + fish.id|string + '.jpg') }}" class="fish-image">
                <form method="POST">
                    <input type="text" name="answer" placeholder="ひらがな・カタカナで入力" autofocus required autocomplete="off">
                    <br>
                    <button type="submit" class="btn-submit">回答する</button>
                </form>
            </div>
        {% else %}
            <div class="finish-area">
                <h2>全問終了！</h2>
                <p>正解数: <strong>{{ score }} / {{ total }}</strong></p>
                <a href="{{ url_for('reset') }}" class="btn-reset">タイトルへ戻る</a>
            </div>
        {% endif %}
    </div>
</body>
</html>
