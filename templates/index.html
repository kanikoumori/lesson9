<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魚の名前あてクイズ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <video src="{{ url_for('static', filename='videos/background.mp4') }}" autoplay muted loop playsinline class="video"></video>

    <div class="container">
        {% if select_level %}
            {% elif not finished %}
            <p>第 {{ step }} 問 / 全 {{ total }} 問</p>
            {% if last_result %}<div class="result {{ last_result.status }}">{{ last_result.msg }}</div>{% endif %}
            
            <div class="quiz-area">
                <img src="{{ url_for('static', filename='images/' + fish.id|string + '.jpg') }}" class="fish-image">
                
                <form method="POST">
                    {% if choices %}
                        <div class="choices-container">
                            {% for c in choices %}
                                <button type="submit" name="answer" value="{{ c }}" class="btn-choice">{{ c }}</button>
                            {% endfor %}
                        </div>
                    {% else %}
                        <input type="text" name="answer" placeholder="ひらがな・カタカナで入力" autofocus required autocomplete="off">
                        <br>
                        <button type="submit" class="btn-submit">回答する</button>
                    {% endif %}
                </form>
            </div>
        {% else %}
            <div class="finish-area">
                <h2>全問終了！</h2>
                <p>正解数: <strong>{{ score }} / {{ total }}</strong></p>
                <a href="{{ url_for('reset') }}" class="btn-reset">タイトルへ戻る</a>
            </div>
        {% endif %}
    </div>
</body>
</html>
